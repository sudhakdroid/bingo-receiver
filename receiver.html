<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SimpleBingo Cast Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .root {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
      background: radial-gradient(circle at top, #2a2a2a, #111 60%);
    }
    .number {
      font-size: clamp(6rem, 25vw, 20rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 0 16px rgba(255, 255, 255, 0.2);
    }
    .phrase {
      font-size: clamp(1.3rem, 3vw, 2.6rem);
      opacity: 0.9;
      min-height: 1.5em;
    }
    .countdown {
      width: min(70vw, 900px);
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
    }
    .countdownFill {
      height: 100%;
      width: 0%;
      background: #6a1b9a;
      transition: width 120ms linear;
    }
  </style>
</head>
<body>
  <div class="root" id="root">
    <div class="number" id="number">-</div>
    <div class="phrase" id="phrase"></div>
    <div class="countdown" id="countdown" style="display:none;">
      <div class="countdownFill" id="countdownFill"></div>
    </div>
  </div>
  <script src="./receiver.js"></script>
</body>
</html>
