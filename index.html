<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bingo Caller Pro Cast Receiver</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .root {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-height: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: clamp(0.5rem, 1.5vmin, 1rem);
      text-align: center;
      background: radial-gradient(circle at top, #2a2a2a, #111 60%);
      overflow: hidden;
    }
    .cast-watermark {
      position: absolute;
      right: clamp(0.5rem, 1.5vmin, 1rem);
      bottom: clamp(0.5rem, 1.5vmin, 1rem);
      z-index: 2;
      margin: 0;
      padding: 0;
      font-size: clamp(0.7rem, 1.65vmin, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #ffffff;
      opacity: 0.14;
      text-align: right;
      line-height: 1.2;
      white-space: nowrap;
      pointer-events: none;
      /* Keeps label readable on both light accents and dark board areas */
      text-shadow:
        0 0 1px rgba(0, 0, 0, 0.95),
        0 1px 4px rgba(0, 0, 0, 0.85);
    }
    .title {
      font-size: clamp(1.15rem, 2.75vmin, 1.85rem);
      font-weight: 800;
      line-height: 1.2;
      padding: 0 0.25rem 0.25rem;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      /* Separates title from the radial accent wash without relying on purple-on-purple */
      text-shadow:
        0 0 1px rgba(0, 0, 0, 0.55),
        0 2px 10px rgba(0, 0, 0, 0.35);
    }
    .hero {
      flex: 0 1 auto;
      max-height: min(42vh, 320px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      padding-bottom: 0.35rem;
      min-height: 0;
    }
    /* Mirrors Compose CallerStage / home AnimatedContent: scaleIn(0.5) + fadeIn with medium-bouncy spring */
    @keyframes heroReveal {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      72% {
        opacity: 1;
        transform: scale(1.04);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
    .hero-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      transform-origin: center center;
    }
    .hero-inner.hero-reveal {
      animation: heroReveal 0.55s cubic-bezier(0.33, 1.24, 0.52, 1) forwards;
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-inner.hero-reveal {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
    .number {
      font-size: clamp(2.85rem, min(14vmin, 19vh), 11rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 0 16px rgba(255, 255, 255, 0.2);
      max-width: 100%;
    }
    .phrase {
      font-size: clamp(1.05rem, 2.85vmin, 2.45rem);
      opacity: 0.92;
      min-height: 0;
      max-width: 95vw;
    }
    .phrase:empty {
      display: none !important;
    }
    .countdown {
      width: min(70vw, 900px);
      height: 14px;
      margin: 0 auto 0.5rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
      flex-shrink: 0;
    }
    .countdownFill {
      height: 100%;
      width: 0%;
      background: #6a1b9a;
      transition: width 120ms linear;
    }
    .board-wrap {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0.15rem 0;
    }
    .board {
      width: 100%;
      height: 100%;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .board-grid {
      display: grid;
      gap: 4px;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .cell {
      box-sizing: border-box;
      min-width: 0;
      min-height: 0;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      border: 2px solid transparent;
      line-height: 1;
      overflow: hidden;
    }
    .cell.header-letter {
      font-weight: 700;
    }
    .cell.called {
      font-weight: 700;
    }
    .cell.just-called {
      border-color: #ffc107;
      border-width: 2px;
      color: #ffecb3 !important;
    }
    .cell.previous-called {
      border-color: #bbdefb;
      border-width: 1.5px;
    }
  </style>
</head>
<body>
  <div class="root" id="root">
    <div class="title" id="title"></div>
    <div class="hero">
      <div class="hero-inner" id="heroInner">
        <div class="number" id="number"></div>
        <div class="phrase" id="phrase"></div>
      </div>
    </div>
    <div class="countdown" id="countdown" style="display:none;">
      <div class="countdownFill" id="countdownFill"></div>
    </div>
    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board"></div>
    </div>
    <p class="cast-watermark" aria-hidden="true">Bingo Caller Pro</p>
  </div>
  <script src="./receiver.js"></script>
</body>
</html>
