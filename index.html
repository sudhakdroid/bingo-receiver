<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SimpleBingo Cast Receiver</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .root {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: clamp(0.75rem, 2vmin, 1.5rem);
      text-align: center;
      background: radial-gradient(circle at top, #2a2a2a, #111 60%);
    }
    .title {
      font-size: clamp(1.1rem, 2.8vmin, 1.75rem);
      font-weight: 600;
      line-height: 1.25;
      padding: 0 0.5rem 0.35rem;
      flex-shrink: 0;
    }
    .hero {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding-bottom: 0.5rem;
    }
    .number {
      font-size: clamp(4rem, 18vmin, 14rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 0 16px rgba(255, 255, 255, 0.2);
    }
    .phrase {
      font-size: clamp(1rem, 2.6vmin, 2.2rem);
      opacity: 0.92;
      min-height: 0;
      max-width: 95vw;
    }
    .phrase:empty {
      display: none !important;
    }
    .countdown {
      width: min(70vw, 900px);
      height: 14px;
      margin: 0 auto 0.5rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
      flex-shrink: 0;
    }
    .countdownFill {
      height: 100%;
      width: 0%;
      background: #6a1b9a;
      transition: width 120ms linear;
    }
    .board-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 0.25rem 0;
    }
    .board {
      width: 100%;
      max-width: min(96vw, 1100px);
      margin: 0 auto;
    }
    .board-grid {
      display: grid;
      gap: 4px;
      width: 100%;
    }
    .board-grid.cols-5 {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }
    .board-grid.cols-10 {
      grid-template-columns: repeat(10, minmax(0, 1fr));
    }
    .cell {
      box-sizing: border-box;
      min-width: 0;
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      font-size: clamp(9px, 2.1vmin, 16px);
      border: 2px solid transparent;
      line-height: 1;
    }
    .cell.header-letter {
      font-weight: 700;
      font-size: clamp(11px, 2.4vmin, 18px);
    }
    .cell.called {
      font-weight: 700;
    }
    .cell.just-called {
      border-color: #ffc107;
      border-width: 2px;
      color: #ffecb3 !important;
    }
    .cell.previous-called {
      border-color: #bbdefb;
      border-width: 1.5px;
    }
  </style>
</head>
<body>
  <div class="root" id="root">
    <div class="title" id="title"></div>
    <div class="hero">
      <div class="number" id="number"></div>
      <div class="phrase" id="phrase"></div>
    </div>
    <div class="countdown" id="countdown" style="display:none;">
      <div class="countdownFill" id="countdownFill"></div>
    </div>
    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board"></div>
    </div>
  </div>
  <script src="./receiver.js"></script>
</body>
</html>
